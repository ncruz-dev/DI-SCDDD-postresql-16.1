name: Test Docker Compose (PostgreSQL)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/postgres-db:16.1 .
      
      - name: Subir imagen a DockerHub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/postgres-db:16.1
      
      - name: Run container for test
        run: |
          docker run -d \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -p 5433:5432 \
            nicolasbncruz/postgres-db:16.1